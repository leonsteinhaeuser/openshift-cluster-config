apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production-aws
spec:
  acme:
    email: PATCH_ME
    privateKeySecretRef:
      name: PATCH_ME
    server: 'https://acme-v02.api.letsencrypt.org/directory'
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token
        selector:
          dnsZones:
            - PATCH_ME api.<cluster-name>.<basedomain>
            - PATCH_ME apps.<cluster-name>.<basedomain>

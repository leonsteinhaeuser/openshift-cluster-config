apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  labels:
    instance: grafana
  name: grafana
spec:
  config:
    auth:
      disable_login_form: "false"
    log:
      mode: console
    security:
      admin_password: start
      admin_user: root
  route:
    spec:
      subdomain: grafana
      tls:
        termination: edge
  version: PATCH_ME
